{% extends 'base.html' %}

{% block content %}

<h2>Danh sách nhân viên</h2>

<a href="/employees/add" class="btn btn-success">
Thêm nhân viên
</a>

<br><br>

<table class="table table-bordered">

<tr>

<th>Tên</th>
<th>Phòng ban</th>
<th>Chức vụ</th>
<th>Thao tác</th>

</tr>

{% for e in employees %}

<tr>

<td>{{e.user.username}}</td>
<td>{{e.department}}</td>
<td>{{e.position}}</td>

<td>

<a href="/employees/edit/{{e.id}}" class="btn btn-warning">
Sửa
</a>

<a href="/employees/delete/{{e.id}}" class="btn btn-danger">
Xóa
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}

<form method="get">

<input type="text" name="q" placeholder="Tìm kiếm nhân viên">

<button class="btn btn-primary">
Tìm
</button>

</form>

<br>

<td>
{% if e.photo %}
<img src="{{e.photo.url}}" width="50">
{% endif %}
</td>
