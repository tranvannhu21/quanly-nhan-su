{% extends 'base.html' %}

{% block content %}

<h2>Đơn nghỉ phép của tôi</h2>

<table class="table">
<tr>
<th>Ngày bắt đầu</th>
<th>Ngày kết thúc</th>
<th>Lý do</th>
<th>Trạng thái</th>
</tr>

{% for leave in leaves %}

<tr>
<td>{{leave.start_date}}</td>
<td>{{leave.end_date}}</td>
<td>{{leave.reason}}</td>
<td>{{leave.status}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
