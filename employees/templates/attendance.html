{% extends 'base.html' %}

{% block content %}

<h2>Chấm công</h2>

<form method="POST">
{% csrf_token %}
<button class="btn btn-success">Check-in</button>
</form>

<hr>

<h3>Lịch sử chấm công</h3>

<table class="table table-bordered">

<tr>
<th>Ngày</th>
<th>Giờ vào</th>
</tr>

{% for r in records %}

<tr>
<td>{{r.date}}</td>
<td>{{r.check_in}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
